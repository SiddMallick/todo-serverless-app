name: TODO frontend CI Workflow

permissions:
    contents: read
    security-events: write
 

on:
    push:
        branches:
            - 'master'
            - 'feature/**'
            - 'ci/**'
        paths:
            - 'frontend/src/**'
    
    pull_request:
        branches:
            - master
        paths:
            - 'frontend/src/**'

jobs:

    build_test:
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/ci/') || github.event_name=='pull_request'
        runs-on: ubuntu-22.04

        steps:
            - name: Checkout
              uses: actions/checkout@v6
            
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: 20
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            
            - name: Install Deps
              working-directory: ./frontend
              run: npm ci --prefer-offline --no-audit
            
            - name: Run audit
              working-directory: ./frontend
              run: npm audit --audit-level=critical

            - name: Run Build
              working-directory: ./frontend
              run : npm run build

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v6
              with:
                name: frontend-build
                path: frontend/dist

    deploy:
        if: github.ref == 'refs/heads/master'
        runs-on: ubuntu-22.04
        needs:
            - build_test
        permissions:
            id-token: write
        
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download Build Artifacts
              uses: actions/download-artifact@v6
              with:
                name: frontend-build
                path: dist

            - name: "Configure AWS Creds - Action for Github Actions"
              uses: aws-actions/configure-aws-credentials@v4.3.1
              with:
                aws-region: ap-south-1
                role-to-assume: arn:aws:iam::${{ secrets.AWS_ACC_ID }}:role/github-actions-role
        
            - name: "Deploy Static website build to S3"
              run: |
                aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET_NAME_DEV }} --delete

            - name: "Invalidate Cloudfront Cache"
              run: |
                aws cloudfront create-invalidation \
                    --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }} \
                    --paths "/*"